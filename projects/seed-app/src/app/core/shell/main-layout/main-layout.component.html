<div class="layout-container" [class.layout-container--mobile]="isMobileView()">
  <header class="bg-surface-brand-strong text-neutral-inverted">
    <app-header
      (sidebarVisibleChange)="toggleSidebar()"
      [showErrorIndicator]="showErrorIndicator()"
      [errorCount]="errorCount()"
      (errorIndicatorClick)="errorIndicatorClick.emit()"
    />
  </header>
  @if (!isMobileView()) {
    <aside>
      <app-left-side-menu [menuItems]="menuItems" />
    </aside>
  } @else {
    <div
      id="navi"
      class="overlay"
      [class.overlay--open]="sidebarVisible()"
    >
      <div class="overlay-content">
        <app-left-side-menu
          [menuItems]="menuItems"
          (menuItemSelected)="closeNav()"
        />
      </div>
    </div>
  }
  <main>
    <router-outlet />
  </main>
  <footer class="border-t border-border">
    <app-footer />
  </footer>
</div>
