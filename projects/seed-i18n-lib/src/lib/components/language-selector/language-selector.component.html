@if (showModal()) {
  <div
    class="fixed inset-0 bg-black/50 flex items-center justify-center z-[9999] p-4 animate-fade-in"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="'languageSelector.title' | translate"
    (click)="closeModal()"
  >
    <div
      class="bg-white rounded-md shadow-lg max-w-[420px] w-full flex flex-col animate-slide-up"
      (click)="$event.stopPropagation()"
    >
      <div
        class="flex items-center justify-between px-3.5 py-2.5 border-b border-gray-200"
      >
        <h2 class="text-sm font-semibold text-gray-800 m-0">
          {{ 'languageSelector.title' | translate }}
        </h2>
        <button
          type="button"
          class="bg-transparent border-none cursor-pointer p-1 rounded hover:bg-gray-100 active:bg-gray-200 transition-all"
          (click)="closeModal()"
          [attr.aria-label]="'languageSelector.close' | translate"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="text-gray-500"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="p-4 flex flex-col gap-4">
        <label class="flex flex-col gap-2 text-sm text-gray-700">
          <span class="font-medium">{{
            'languageSelector.label' | translate
          }}</span>
          <select
            #localeSelect
            class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-800 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
            (change)="onLocaleChange($event)"
          >
            @for (locale of supportedLocales; track locale) {
              <option [value]="locale" [selected]="selectedLocale() === locale">
                {{ localeLabelKey(locale) | translate }}
              </option>
            }
          </select>
        </label>
        <div class="flex justify-end gap-2">
          <button
            type="button"
            class="px-3 py-1.5 rounded text-xs font-medium border border-gray-300 text-gray-700 hover:bg-gray-50 active:bg-gray-100 transition-all"
            (click)="closeModal()"
          >
            {{ 'languageSelector.cancel' | translate }}
          </button>
          <button
            type="button"
            class="px-3 py-1.5 rounded text-xs font-medium bg-blue-600 text-white hover:bg-blue-700 active:bg-blue-800 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
            [disabled]="isApplying()"
            (click)="applyLocale()"
          >
            {{ 'languageSelector.apply' | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
}
